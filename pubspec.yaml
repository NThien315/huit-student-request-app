name: huit_student_request_app
description: "Ứng dụng theo dõi quy trình xử lý yêu cầu của Sinh viên với Khoa CNTT"
publish_to: 'none'
version: 0.1.0

environment:
  sdk: ^3.10.7

dependencies:
  flutter:
    sdk: flutter
  shared_preferences: ^2.5.5

  # ── Supabase Core ──────────────────────────────────────
  supabase_flutter: ^2.8.4

  # ── State Management ───────────────────────────────────
  provider: ^6.1.2

  # ── UI / UX ────────────────────────────────────────────
  cupertino_icons: ^1.0.8
  flutter_local_notifications: 17.2.4

  # ── Utilities ──────────────────────────────────────────
  image_picker: ^1.2.2
  intl: ^0.19.0
  uuid: ^4.4.2
  file_picker: ^11.0.2
  http: ^1.6.0
  html: ^0.15.6
  url_launcher: ^6.3.2
  firebase_core: ^4.9.0
  firebase_messaging: ^16.2.2
  flutter_image_compress: ^2.4.0
  path_provider: ^2.1.5
  shimmer: ^3.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.13.1

flutter:
  uses-material-design: true

  assets:
    - assets/icons/
    - assets/images/

fonts:
  - family: Be Vietnam Pro
    fonts:
     - asset: assets/fonts/BeVietnamPro-Regular.ttf
     - asset: assets/fonts/BeVietnamPro-Medium.ttf
     - asset: assets/fonts/BeVietnamPro-SemiBold.ttf
     - asset: assets/fonts/BeVietnamPro-Bold.ttf

icons:
  - asset: assets/icons/app_icon.png

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/images/logo.png"
  min_sdk_android: 21
