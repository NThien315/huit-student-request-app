name: huit_student_request_app
description: "Ứng dụng theo dõi quy trình xử lý yêu cầu của Sinh viên với Khoa CNTT"
publish_to: 'none'
version: 0.1.0

environment:
  sdk: ^3.10.7

dependencies:
  flutter:
    sdk: flutter
  shared_preferences: ^2.5.5

  # ── Firebase Core ──────────────────────────────────────
  firebase_core: ^3.3.0
  firebase_auth: ^5.1.4
  cloud_firestore: ^5.2.1
  firebase_messaging: ^15.0.4
  firebase_storage: ^12.1.3

  # ── State Management ───────────────────────────────────
  provider: ^6.1.2

  # ── UI / UX ────────────────────────────────────────────
  cupertino_icons: ^1.0.8
  flutter_local_notifications: ^17.2.3

  # ── Utilities ──────────────────────────────────────────
  image_picker: ^1.2.2
  intl: ^0.19.0
  uuid: ^4.4.2
  file_picker: ^11.0.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/icons/
    - assets/images/

fonts:
  - family: Be Vietnam Pro
    fonts:
     - asset: assets/fonts/BeVietnamPro-Regular.ttf
     - asset: assets/fonts/BeVietnamPro-Medium.ttf
     - asset: assets/fonts/BeVietnamPro-SemiBold.ttf
     - asset: assets/fonts/BeVietnamPro-Bold.ttf

icons:
  - asset: assets/icons/app_icon.png


